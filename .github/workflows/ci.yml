name: ci/cd pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (package)
        run: mvn clean package --batch-mode --no-transfer-progress

      - name: Run unit tests
        run: mvn test --batch-mode --no-transfer-progress

      - name: Run integration tests
        run: mvn failsafe:integration-test failsafe:verify --batch-mode --no-transfer-progress

      - name: Generate JaCoCo report
        run: mvn jacoco:report --batch-mode --no-transfer-progress

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy-to-gcp-vm:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host gcp-vm-instance
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/id_rsa
          EOF

      - name: Upload app to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='target' \
            ./ gcp-vm-instance:/home/mr/applications/payments-service/

      - name: Deploy on server
        run: |
          ssh gcp-vm-instance "
            export PAYMENT_SERVICE_MYSQL_DB_PASSWORD='${{ secrets.PAYMENT_SERVICE_MYSQL_DB_PASSWORD }}'
            export PAYMENT_SERVICE_MYSQL_DB_USER='${{ secrets.PAYMENT_SERVICE_MYSQL_DB_USER }}'
            export PAYMENT_SERVICE_TPAY_API_CLIENT_ID='${{ secrets.PAYMENT_SERVICE_TPAY_API_CLIENT_ID }}'
            export PAYMENT_SERVICE_TPAY_API_CLIENT_SECRET='${{ secrets.PAYMENT_SERVICE_TPAY_API_CLIENT_SECRET }}'
            export PAYMENT_SERVICE_TPAY_API_SECURITY_CODE='${{ secrets.PAYMENT_SERVICE_TPAY_API_SECURITY_CODE }}'
            export PAYMENT_SERVICE_TPAY_APP_NOTIFICATION_URL='${{ secrets.PAYMENT_SERVICE_TPAY_APP_NOTIFICATION_URL }}'
            export PAYMENT_SERVICE_TPAY_APP_RETURN_ERROR_URL='${{ secrets.PAYMENT_SERVICE_TPAY_APP_RETURN_ERROR_URL }}'
            export PAYMENT_SERVICE_TPAY_APP_RETURN_SUCCESS_URL='${{ secrets.PAYMENT_SERVICE_TPAY_APP_RETURN_SUCCESS_URL }}'
            APP_DIR='/home/mr/applications/payments-service'
            cd \"\$APP_DIR\"

            envsubst < .env.template > .env

            docker compose down || true
            docker compose --env-file .env up -d --build
          "